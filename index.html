<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#07050f" />
  <meta name="description" content="A peaceful fidget playground for Gia — soft light, gentle motion, all the colors of hope." />
  <title>For Gia — A Fidget Playground</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Inter:wght@300;400;500&display=swap"
  />

  <link rel="stylesheet" href="styles.css" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.0/tsparticles.slim.bundle.min.js" defer></script>
</head>
<body>
  <canvas id="ambient-canvas" aria-hidden="true"></canvas>

  <div class="vignette" aria-hidden="true"></div>

  <header class="site-header">
    <h1 class="title">For Gia</h1>
    <span class="gia-tag" aria-hidden="true">✦ GIA ✦</span>
  </header>

  <main id="effects-stage" class="effects-stage" aria-label="Effects">
    <div class="welcome-card" id="welcome-card" aria-label="Welcome">
      <p class="welcome-card-text">A peaceful fidget playground ✨</p>
      <p class="welcome-card-sub">Tap a chip below to create something beautiful</p>
      <button class="welcome-btn" type="button" aria-label="Start Playing">Start Playing</button>
    </div>
    <div class="empty-state-prompt hidden" id="empty-state-prompt" aria-hidden="true">
      <span class="empty-state-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="32" height="32"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.6"/><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.3"/><circle cx="12" cy="12" r="11" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.15"/></svg>
      </span>
      <span class="empty-state-text">Tap a glow below to begin</span>
    </div>
  </main>

  <nav class="chip-tray" id="chip-tray" aria-label="Add an effect">
    <div class="chip-tray-inner" id="chip-tray-inner">
      <button class="chip" data-effect="fluid-goo" type="button" aria-label="Goo Blob">
        <span class="chip-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 3c3 0 5 2 5 5 2 0 4 2 4 5s-2 5-5 5c-1 2-3 3-5 3-3 0-5-2-5-5-2 0-4-2-4-5s2-5 4-5c0-3 2-5 5-5z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        </span>
        <span class="chip-label">Goo</span>
      </button>
      <button class="chip" data-effect="soap-bubble" type="button" aria-label="Soap Bubble">
        <span class="chip-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M7 9c1.5 1 4 1 6 0M9 14c1 1 3 1 5 0" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </span>
        <span class="chip-label">Bubble</span>
      </button>
      <button class="chip" data-effect="petal-drift" type="button" aria-label="Petal Drift">
        <span class="chip-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 4c2 3 2 5 0 8-2-3-2-5 0-8zM12 12c2 3 2 5 0 8-2-3-2-5 0-8zM4 12c3-2 5-2 8 0-3 2-5 2-8 0zM20 12c-3-2-5-2-8 0 3 2 5 2 8 0z" fill="currentColor" opacity=".7"/></svg>
        </span>
        <span class="chip-label">Petals</span>
      </button>
      <button class="chip" data-effect="aurora-ribbon" type="button" aria-label="Aurora Ribbon">
        <span class="chip-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M2 12c3-4 6-4 9 0s6 4 9 0M2 17c3-4 6-4 9 0s6 4 9 0" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </span>
        <span class="chip-label">Aurora</span>
      </button>
      <button class="chip" data-effect="galaxy" type="button" aria-label="Spinning Galaxy">
        <span class="chip-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="6" cy="8" r="1" fill="currentColor" opacity=".7"/><circle cx="18" cy="9" r="1" fill="currentColor" opacity=".7"/><circle cx="7" cy="16" r="1" fill="currentColor" opacity=".7"/><circle cx="17" cy="17" r="1" fill="currentColor" opacity=".7"/><circle cx="12" cy="5" r=".8" fill="currentColor" opacity=".5"/><circle cx="12" cy="19" r=".8" fill="currentColor" opacity=".5"/></svg>
        </span>
        <span class="chip-label">Galaxy</span>
      </button>
      <button class="chip" data-effect="glow-ripple" type="button" aria-label="Glow Ripple">
        <span class="chip-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="12" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="1.2" opacity=".6"/><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1" opacity=".3"/></svg>
        </span>
        <span class="chip-label">Ripple</span>
      </button>
      <button class="chip" data-effect="sand-pour" type="button" aria-label="Sand Pour">
        <span class="chip-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 4c-2 4-2 8 0 12 2-4 2-8 0-12zM6 10c2 2 4 2 6 0M12 10c2 2 4 2 6 0M9 16c1 2 2 2 3 0M12 16c1 2 2 2 3 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </span>
        <span class="chip-label">Sand</span>
      </button>
      <button class="chip" data-effect="chill-3d" type="button" aria-label="3D Dreamscape">
        <span class="chip-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
        </span>
        <span class="chip-label">3D</span>
      </button>
      <button class="chip chip-word" data-effect="love-note" type="button" aria-label="I Love You, Dad">
        <span class="chip-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2.7A4 4 0 0 1 19 10c0 5.5-7 10-7 10z" fill="currentColor" opacity=".75"/></svg>
        </span>
        <span class="chip-label">Love</span>
      </button>
      <button class="chip chip-word" data-effect="never-give-up" type="button" aria-label="Never Give Up">
        <span class="chip-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 3l2.2 5 5.3.5-4 3.6 1.2 5.2L12 14.8 7.3 17.3l1.2-5.2-4-3.6 5.3-.5L12 3z" fill="currentColor" opacity=".75"/></svg>
        </span>
        <span class="chip-label">Hope</span>
      </button>
      <span class="chip-divider" aria-hidden="true"></span>
      <button class="chip chip-toggle" data-effect="symmetry-toggle" type="button" aria-label="Toggle Symmetry">
        <span class="chip-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><line x1="12" y1="3" x2="12" y2="21" stroke="currentColor" stroke-width="2"/><path d="M8 8l-4 4 4 4M16 8l4 4-4 4" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </span>
        <span class="chip-label">Mirror</span>
      </button>
      <button class="chip chip-toggle" data-effect="audio-mute" type="button" aria-label="Toggle Audio">
        <span class="chip-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 10v4h4l5 4V6L8 10H4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M16 8c1.5 1.5 1.5 6.5 0 8M19 5c3 3 3 11 0 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </span>
        <span class="chip-label">Audio</span>
      </button>
    </div>
  </nav>

  <!-- Persistent control hints — always visible bottom strip.
        Mobile: Move · Resize · Spin · Close
        Desktop: Move · Resize · Spin · Tilt · Zoom · Close -->
  <aside class="controls-hint" id="controls-hint" aria-label="How to interact with effects">
    <span class="hint-item">Move</span>
    <span class="hint-item">·</span>
    <span class="hint-item">Resize</span>
    <span class="hint-item">·</span>
    <span class="hint-item">Spin</span>
    <span class="hint-item">·</span>
    <span class="hint-item hint-wheel">Tilt</span>
    <span class="hint-item hint-wheel">·</span>
    <span class="hint-item hint-wheel">Zoom</span>
    <span class="hint-item">·</span>
    <span class="hint-item">Close</span>
  </aside>

  <script type="module" src="main.js"></script>
</body>
</html>
