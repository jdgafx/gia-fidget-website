<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0f0a1e">
  <meta name="description" content="A peaceful fidget playground for Gia — soft light, gentle motion, all the colors of hope.">
  <title>For Gia — Fidget Playground</title>

  <!-- Google Fonts: Inter and Cormorant Garamond -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Ambient background canvas -->
  <canvas id="ambient-canvas"></canvas>

  <header class="site-header">
    <h1 class="title">For Gia</h1>
    <p class="tagline">✦ GIA ✦</p>
  </header>

  <!-- Control Buttons (Mute and Symmetry) -->
  <div class="control-panel">
    <button id="mute-btn" class="icon-btn" aria-label="Mute Audio">
      <svg class="sound-on" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
      <svg class="sound-off hidden" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
    </button>
    <button id="symmetry-btn" class="icon-btn" aria-label="Toggle Mirror Mode">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="2" x2="12" y2="22"></line></svg>
      <span id="symmetry-badge">Off</span>
    </button>
  </div>

  <!-- The Fidget Stage -->
  <main id="playground"></main>

  <!-- Bottom Chip Tray -->
  <nav class="chip-tray-container" aria-label="Companion Spawn Tray">
    <div class="chip-tray">
      <button class="chip glow-goo" data-effect="fluid-goo" aria-label="Spawn Fluid Goo">
        <span class="chip-icon">💧</span>
        <span class="chip-label">Goo</span>
      </button>
      <button class="chip glow-bubble" data-effect="soap-bubble" aria-label="Spawn Soap Bubble">
        <span class="chip-icon">🫧</span>
        <span class="chip-label">Bubble</span>
      </button>
      <button class="chip glow-petals" data-effect="petal-drift" aria-label="Spawn Petal Drift">
        <span class="chip-icon">🌸</span>
        <span class="chip-label">Petals</span>
      </button>
      <button class="chip glow-aurora" data-effect="aurora-ribbon" aria-label="Spawn Aurora Ribbon">
        <span class="chip-icon">🌈</span>
        <span class="chip-label">Aurora</span>
      </button>
      <button class="chip glow-galaxy" data-effect="galaxy" aria-label="Spawn Galaxy">
        <span class="chip-icon">🌌</span>
        <span class="chip-label">Galaxy</span>
      </button>
      <button class="chip glow-ripple" data-effect="glow-ripple" aria-label="Spawn Glow Ripple">
        <span class="chip-icon">💫</span>
        <span class="chip-label">Ripple</span>
      </button>
      <button class="chip glow-sand" data-effect="sand-pour" aria-label="Spawn Sand Pour">
        <span class="chip-icon">⏳</span>
        <span class="chip-label">Sand</span>
      </button>
      <button class="chip glow-3d" data-effect="chill-3d" aria-label="Spawn Dreamscape">
        <span class="chip-icon">🔮</span>
        <span class="chip-label">3D</span>
      </button>
      <button class="chip glow-love" data-effect="love-note" aria-label="Spawn Love Note">
        <span class="chip-icon">❤️</span>
        <span class="chip-label">Love</span>
      </button>
      <button class="chip glow-hope" data-effect="never-give-up" aria-label="Spawn Hope Card">
        <span class="chip-icon">⭐</span>
        <span class="chip-label">Hope</span>
      </button>
    </div>
  </nav>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- App Bootstrap -->
  <script type="module" src="main.js"></script>
</body>
</html>
