<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#07050f" />
  <meta name="description" content="A playful fidget playground for Gia — grab, fling, spin, and explode everything." />
  <title>For Gia — Fidget Playground</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Inter:wght@300;400;500&display=swap"
  />

  <link rel="stylesheet" href="styles.css" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
</head>
<body>
  <canvas id="ambient-canvas" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <header class="site-header">
    <h1 class="title">For Gia</h1>
    <span class="gia-tag" aria-hidden="true">✦ GIA ✦</span>
  </header>

  <main id="effects-stage" class="effects-stage" aria-label="Effects">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-orb"></div>
      <p class="empty-state-text">Long-press anywhere to begin</p>
    </div>
  </main>

  <aside class="controls-hint" id="controls-hint" aria-label="How to interact">
    <span class="hint-item">Grab</span>
    <span class="hint-item">·</span>
    <span class="hint-item">Fling</span>
    <span class="hint-item">·</span>
    <span class="hint-item">Spin</span>
    <span class="hint-item">·</span>
    <span class="hint-item">Double-tap to explode</span>
  </aside>

  <script type="module" src="main.js"></script>
</body>
</html>
