<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#07050f" />
  <meta name="description" content="A playful fidget playground for Gia — grab, fling, spin, and explode everything." />
  <title>For Gia — Fidget Playground</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Inter:wght@300;400;500&display=swap"
  />

  <link rel="stylesheet" href="styles.css" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
</head>
<body>
  <canvas id="ambient-canvas" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <header class="site-header">
    <h1 class="title">For Gia</h1>
    <span class="gia-tag" aria-hidden="true">✦ GIA ✦</span>
  </header>

  <div class="site-controls" id="site-controls" aria-label="Controls">
    <button class="control-btn" id="audio-toggle" type="button" aria-label="Toggle Audio">
      <svg class="icon-audio-on" viewBox="0 0 24 24" width="20" height="20" fill="none"><path d="M12 3v18l-6-6H2V9h4l6-6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/><path d="M15.5 8.5a4 4 0 0 1 0 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M19 5.5a9 9 0 0 1 0 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <svg class="icon-audio-off hidden" viewBox="0 0 24 24" width="20" height="20" fill="none"><path d="M12 3v18l-6-6H2V9h4l6-6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/><line x1="22" y1="9" x2="16" y2="15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="16" y1="9" x2="22" y2="15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
    <button class="control-btn" id="symmetry-toggle" type="button" aria-label="Toggle Mirror Mode">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none"><line x1="12" y1="3" x2="12" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M8 8l-4 4 4 4M16 8l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></svg>
      <span class="control-badge" id="symmetry-badge">Off</span>
    </button>
  </div>

  <main id="effects-stage" class="effects-stage" aria-label="Effects">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-orb"></div>
      <p class="empty-state-text">Long-press anywhere to begin</p>
    </div>
  </main>

  <aside class="controls-hint" id="controls-hint" aria-label="How to interact">
    <span class="hint-item">Grab</span>
    <span class="hint-item">·</span>
    <span class="hint-item">Fling</span>
    <span class="hint-item">·</span>
    <span class="hint-item">Spin</span>
    <span class="hint-item">·</span>
    <span class="hint-item">Double-tap to explode</span>
  </aside>

  <script type="module" src="main.js"></script>
</body>
</html>
